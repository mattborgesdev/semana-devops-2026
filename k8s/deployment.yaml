apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-map-brasil
  namespace: semana-devops
  labels:
    app: devops-map-brasil
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops-map-brasil
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devops-map-brasil
        version: v1
    spec:
      containers:
        - name: devops-map-brasil
          # ── IMPORTANTE: Troque <SEU_DOCKERHUB_USER> pelo seu usuário ──
          image: linuxtips/testmap:1.1
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: APP_VERSION
              value: "1.0.0"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          imagePullPolicy: Always
          # ── Probes: o K8s sabe se a app está viva e pronta ──
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
      # ── Não rodar como root (segurança) ──
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
