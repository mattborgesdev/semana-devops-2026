name: AI PR Description

on:
  pull_request:
    types: [opened]

jobs:
  ai-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Collect PR context
        run: |
          git fetch origin ${{ github.base_ref }}

          echo "TITLE: ${{ github.event.pull_request.title }}" > context.txt
          echo "" >> context.txt
          echo "FILES:" >> context.txt
          git diff --name-only origin/${{ github.base_ref }} >> context.txt
          echo "" >> context.txt
          echo "DIFF:" >> context.txt
          git diff --stat origin/${{ github.base_ref }} >> context.txt

      - name: Install Ollama
        run: curl -fsSL https://ollama.ai/install.sh | sh

      - name: Start Ollama
        run: ollama serve & sleep 5

      - name: Pull phi3 mini model
        run: ollama pull phi3:mini

      - name: Generate PR description
        run: |
          cat > prompt.txt << 'EOF'
          Write a simple GitHub PR description with 2 sections:

          ## Overview
          [1-2 sentences summarizing what this PR does]

          ## Description
          [brief description of the changes]

          Context:
          EOF
          cat context.txt >> prompt.txt
          echo "" >> prompt.txt
          echo "Keep it simple and concise." >> prompt.txt
          ollama run phi3:mini < prompt.txt > pr_body.md

      - name: Update PR
        run: gh pr edit ${{ github.event.pull_request.number }} --body-file pr_body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}